apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

android {
    namespace = "com.adam.app.demoset"
    compileSdk = 35
    ndkVersion = "21.4.7075529"

    signingConfigs {
        getByName("debug") {
            storeFile = file("$rootDir/SingApk/SignDemo.jks")
            storePassword = project.findProperty("STORE_PASSWORD")
            keyAlias = project.findProperty("KEY_ALIAS")
            keyPassword = project.findProperty("KEY_PASSWORD")
        }
        create("release") {
            storeFile = file("$rootDir/SingApk/SignDemo.jks")
            storePassword = project.findProperty("STORE_PASSWORD")
            keyAlias = project.findProperty("KEY_ALIAS")
            keyPassword = project.findProperty("KEY_PASSWORD")
        }
    }


    defaultConfig {
        applicationId = "com.adam.app.demoset"
        minSdk = 24
        targetSdk = 35
        versionCode = 1
        versionName = "1.0"
        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
    }


    buildTypes {
        getByName("release") {
            signingConfig = signingConfigs.release
            minifyEnabled  = false
            proguardFiles(getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro")
        }

        getByName("debug") {
            signingConfig = signingConfigs.debug
            minifyEnabled  = false
            proguardFiles(getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro")
        }

    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        aidl = true
        viewBinding = true
        dataBinding = true
        compose = true
    }

    externalNativeBuild {
        cmake {
            path = file("CMakeLists.txt")
        }
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
        }
    }

    lint {
        abortOnError = false
    }

//    configurations.configureEach {
//        exclude group: "org.jetbrains", module: "annotations"
//    }
}

kotlin {
    jvmToolchain(17)
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation("androidx.appcompat:appcompat:1.7.0")
    implementation("androidx.constraintlayout:constraintlayout:2.2.1")
    implementation("com.google.android.material:material:1.12.0")

    implementation("androidx.core:core:1.15.0")
    implementation("androidx.core:core-ktx:1.15.0")
    implementation("androidx.activity:activity:1.10.0") // 從 1.13.0 降級
    implementation("androidx.activity:activity-compose:1.10.0") // 從 1.10.1 降級

    implementation("androidx.recyclerview:recyclerview:1.4.0")
    implementation("androidx.legacy:legacy-support-v4:1.0.0")
    implementation("androidx.cardview:cardview:1.0.0")
    implementation ("org.jetbrains:annotations:24.0.1")

    // Room
    implementation("androidx.room:room-runtime:2.6.1")
    implementation 'androidx.paging:paging-common:3.4.2'
    implementation 'androidx.paging:paging-runtime-ktx:3.4.2'
    annotationProcessor("androidx.room:room-compiler:2.6.1")
    androidTestImplementation("androidx.room:room-testing:2.6.1")

    // Lifecycle
    implementation("androidx.lifecycle:lifecycle-viewmodel-ktx:2.8.7")
    implementation("androidx.lifecycle:lifecycle-livedata-ktx:2.8.7")
    implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.7")
    annotationProcessor("androidx.lifecycle:lifecycle-compiler:2.8.7")

    // WorkManager
    implementation("androidx.work:work-runtime:${rootProject.ext["workingVersion"]}")

    // Glide
    implementation("com.github.bumptech.glide:glide:${rootProject.ext["glide"]}")

    // Logger / USB
    implementation("com.orhanobut:logger:2.2.0")
    implementation("com.github.mjdev:libaums:0.7.4")

    // Coroutine + Retrofit
    implementation("com.squareup.retrofit2:retrofit:2.9.0")
    implementation("com.squareup.retrofit2:converter-gson:2.9.0")
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3")


    // compose
    implementation platform('androidx.compose:compose-bom:2024.12.01')
    implementation "androidx.compose.ui:ui"
    implementation "androidx.compose.material3:material3"
    implementation "androidx.compose.ui:ui-tooling-preview"
    implementation "androidx.lifecycle:lifecycle-viewmodel-compose:2.8.7"

    // datastore
    // 1. DataStore Core & Preferences
    implementation "androidx.datastore:datastore-preferences:1.0.0"

    // 2. DataStore Java / RxJava3 支援 (Java 專案必備)
    implementation "androidx.datastore:datastore-preferences-rxjava3:1.0.0"

    // 3. RxJava3 (用於橋接 DataStore 的數據流)
    implementation "io.reactivex.rxjava3:rxandroid:3.0.2"
    implementation "io.reactivex.rxjava3:rxjava:3.1.5"

    // others
    implementation("org.jspecify:jspecify:1.0.0")

    // Testing
    testImplementation("junit:junit:4.13.2")
    testImplementation("org.mockito:mockito-core:5.16.0")
    testImplementation("org.robolectric:robolectric:4.14.1")
    androidTestImplementation("androidx.test.ext:junit:1.2.1")
    androidTestImplementation("androidx.test.espresso:espresso-core:3.6.1")
}
